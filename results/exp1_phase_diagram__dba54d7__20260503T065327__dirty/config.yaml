experiment_id: exp1_phase_diagram
profile: smoke
schema_version: 1
seed_root: 20260502

# Tiny grid for fast end-to-end iteration (<1 minute on a laptop).
n_grid: [200, 1000, 5000]
beta_grid: [0.4, 1.0, 1.5]
rho_grid: [0.0, 1.0, 2.0]

constants:
  a: 1.0
  B0: 1.0
  sigma_s2: 1.0
  kappa: 1.0
  theta_star: 0.0

replications:
  default: 200

estimators:
  - real_only_all
  - synthetic_only_full_calibration
  - naive_pooling
  - fixed_half_split_oracle_alpha
  - old_fixed_share_oracle_alpha
  - corrected_oracle_gn
  - safe_corrected_oracle_gn

naive_pooling:
  x_strategy: half_split

parallel:
  unit: cell
  n_jobs: -1
  backend: loky

output:
  results_root: results/
