experiment_id: exp1_phase_diagram
profile: full
schema_version: 1
seed_root: 20260502

# Full §4.3 grid.
n_grid: [100, 200, 500, 1000, 2000, 5000, 10000, 20000]
beta_grid: [0.25, 0.4, 0.5, 0.75, 1.0, 1.5, 2.0]
rho_grid: [0.0, 0.5, 1.0, 1.5, 2.0, 3.0]

constants:
  a: 1.0
  B0: 1.0
  sigma_s2: 1.0
  kappa: 1.0
  theta_star: 0.0

# §4.6: 5000 reps for n<=5000, 2000 for larger.
replications:
  default: 5000
  overrides:
    - {n_min: 5001, R: 2000}

estimators:
  - real_only_all
  - synthetic_only_full_calibration
  - naive_pooling
  - fixed_half_split_oracle_alpha
  - old_fixed_share_oracle_alpha
  - corrected_oracle_gn
  - safe_corrected_oracle_gn

naive_pooling:
  x_strategy: half_split

parallel:
  unit: cell
  n_jobs: -1
  backend: loky

output:
  results_root: results/
